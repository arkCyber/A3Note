name: Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: A3Note v${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: false
          body: |
            ## A3Note v${{ steps.get_version.outputs.version }}
            
            ### Features
            - High-performance note-taking with Rust backend
            - Markdown editing with CodeMirror 6
            - Full-text search
            - Auto-save functionality
            - Dark theme
            
            ### Downloads
            Download the appropriate version for your operating system below.
            
            ### Installation
            - **macOS**: Download the .dmg file
            - **Windows**: Download the .msi installer
            - **Linux**: Download the .AppImage or .deb package

  build-release:
    name: Build Release - ${{ matrix.platform }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            os: macos-latest
            target: 'x86_64-apple-darwin'
            arch: 'x64'
          - platform: 'macos-latest-arm'
            os: macos-latest
            target: 'aarch64-apple-darwin'
            arch: 'arm64'
          - platform: 'ubuntu-latest'
            os: ubuntu-latest
            target: 'x86_64-unknown-linux-gnu'
            arch: 'x64'
          - platform: 'windows-latest'
            os: windows-latest
            target: 'x86_64-pc-windows-msvc'
            arch: 'x64'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build application
        run: npm run tauri:build
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Upload macOS DMG
        if: matrix.os == 'macos-latest'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./src-tauri/target/release/bundle/dmg/A3Note_${{ needs.create-release.outputs.version }}_${{ matrix.arch }}.dmg
          asset_name: A3Note_${{ needs.create-release.outputs.version }}_${{ matrix.arch }}.dmg
          asset_content_type: application/octet-stream

      - name: Upload Windows MSI
        if: matrix.os == 'windows-latest'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./src-tauri/target/release/bundle/msi/A3Note_${{ needs.create-release.outputs.version }}_${{ matrix.arch }}.msi
          asset_name: A3Note_${{ needs.create-release.outputs.version }}_${{ matrix.arch }}.msi
          asset_content_type: application/octet-stream

      - name: Upload Linux AppImage
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./src-tauri/target/release/bundle/appimage/a3note_${{ needs.create-release.outputs.version }}_amd64.AppImage
          asset_name: A3Note_${{ needs.create-release.outputs.version }}_amd64.AppImage
          asset_content_type: application/octet-stream

      - name: Upload Linux DEB
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./src-tauri/target/release/bundle/deb/a3note_${{ needs.create-release.outputs.version }}_amd64.deb
          asset_name: A3Note_${{ needs.create-release.outputs.version }}_amd64.deb
          asset_content_type: application/octet-stream
